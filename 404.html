<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wikybook — Mengalihkan...</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Simpan path di sessionStorage lalu redirect ke index.html
    var path = window.location.pathname + window.location.search;
    sessionStorage.setItem('spa_redirect', path);
    window.location.replace('/');
  </script>
</head>
<body>
  <p>Mengalihkan ke Wikybook...</p>
</body>
</html>
